    let subs='';for(const k of [A,B]){const yd=(k.yedek||[]);if(yd.length)subs+='<div class="subh">'+k.tk+' — Yedekler</div>'+yd.map(nm=>{const ad=(typeof nm==='string')?nm:nm.ad;let gi=null;for(const o of olay){if(o.tur==='subst'&&o.tk===k.tk&&(sonad(o.oyuncu)===sonad(ad)||sonad(o.asist)===sonad(ad))){gi=o.dk;break;}}const g2=gi?('<span style="color:#1faa5a">↑'+gi+"'</span>"):'';const rt=(nm&&nm.rt)?('<span style="color:#7c8aa0">'+nm.rt+'</span>'):'';return '<div class="pl"><span class="no">•</span><span class="pn">'+ad+'</span><span class="ev">'+ikon(olay,ad)+' '+rt+g2+'</span></div>';}).join('');}

  var genelH='';
  if(d.genelstat){var GA=d.genelstat.ev,GB=d.genelstat.dep;
    var srow=function(lbl,a,b){var na=parseFloat(a)||0,nb=parseFloat(b)||0,t=na+nb||1;return '<div class="st1"><div class="stt"><span>'+a+'</span><span class="lbl">'+lbl+'</span><span>'+b+'</span></div><div class="stb"><div class="w2"><i class="lh" style="width:'+(100*na/t)+'%"></i></div><div class="w3"><i class="rh" style="width:'+(100*nb/t)+'%"></i></div></div></div>';};

    for(const it of STAT){const k=it[0],ad=it[1];if(A[k]==null&&B[k]==null)continue;let va=A[k]==null?'0':A[k],vb=B[k]==null?'0':B[k],na=parseFloat(va)||0,nb=parseFloat(vb)||0,t=na+nb||1;

    if(s)pIstat=s;}
  // ── İKİ TAHMİN: AI (bizim motor) + Tahminci (API) ──

    }
    cardAI='<div class="pcard ai"><div class="ph"><span class="av ai">🤖</span>ciki · Uzman Analist<span class="badge a">AI</span></div><div class="body">'+a.analiz+'</div>'+formH

      +(a.sorular||[]).map(q=>'<details class="aq"><summary>✦ '+q.s+'</summary><div class="ac">'+q.c+'</div></details>').join('')
      +sohbetH+'</div>';
  }else{
    cardAI='<div class="pcard ai"><div class="ph"><span class="av ai">🤖</span>ciki · Uzman Analist<span class="badge a">AI</span></div><div class="body">ciki bu maçı <b>canlı istatistik, xG, form ve geçmişle</b> okur. Aşağıdan <b>sor</b> → canlı cevaplar 👇</div>'+(m.kapsam?sohbetH:'<div class="mini" style="margin-top:8px">Bu maç kapsam dışı — soru alınmıyor.</div>')+'</div>';
  }
  let cardTah='<div class="pcard"><div class="ph"><span class="av">👤</span>Tahminci Analizi<span class="badge t">İSTATİSTİK</span></div><div class="body"><div class="yok">Bu maç için tahminci görüşü yok.</div></div></div>';
  if(TH){const yh=parseInt(TH.yuzde.ev)||0,yd=parseInt(TH.yuzde.ber)||0,ya=parseInt(TH.yuzde.dep)||0;
    const guc=(TH.guc&&TH.guc.home)?('<div style="margin-top:9px;font-size:12px;color:#7c8aa0">Genel güç: <b style="color:#16202e">'+m.ev+'</b> '+TH.guc.home+' · <b style="color:#16202e">'+m.dep+'</b> '+TH.guc.away+'</div>'):'';

    var optKazandi=function(gAd,l){if(m.eg==null||m.dg==null)return false;var tot=m.eg+m.dg;

async function canliGuncelle(){
  if(document.getElementById('karne').classList.contains('on')||document.getElementById('toto').classList.contains('on'))return;
  if(!AKTIF_TARIH)return;
  try{var fx=await (await fetch(API+'/data/fikstur_'+AKTIF_TARIH+'.json?_='+Date.now())).json();fx.maclar.forEach(function(m){MAC[m.id]=m;});}catch(e){return;}
  var det=document.getElementById('detay');
  if(det.classList.contains('on')){
    var m=MAC[AKTIF_MAC];
    if(m&&canli(m.durum)){
      var tabEl=document.querySelector('#detay .sk2.on');var tabKey=tabEl?tabEl.getAttribute('data-k'):null;
      var y=det.scrollTop;
      await ac(AKTIF_MAC);
      if(tabKey){var t=document.querySelector('#detay .sk2[data-k="'+tabKey+'"]');if(t)t.click();}
      det.scrollTop=y;
    }
    return;
  }
  var wy=window.scrollY;loadGun(AKTIF_TARIH,null,true).then(function(){window.scrollTo(0,wy);});
}
setInterval(canliGuncelle,30000);
init();
