workflows:
  ios-capacitor:
    name: cikicikigoal iOS (Capacitor CocoaPods)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: cikicikibaba ASC      # ASC API key — CLI imza araçlarına otomatik geçer
    environment:
      groups:
        - ios_signing          # Codemagic UI: bu grup + DIST_CERT_KEY_B64 (Secure)
      vars:
        BUNDLE_ID: "com.cikicikigoal.app"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 22
      xcode: latest
      # Capacitor: iOS'u CocoaPods modunda kuruyoruz (LevelPlay reklam SDK'sı = IronSource podspec, SPM'de yok)
    scripts:
      - name: npm install
        script: npm install
      - name: iOS'u CocoaPods moduna çevir (reklam SDK için) + Info.plist koru
        script: |
          set -e
          # git'teki Info.plist (76 SKAdNetwork + ATT) yedekle
          cp ios/App/App/Info.plist /tmp/Info_ccg.plist
          # SPM iOS'u kaldır, CocoaPods (Podfile) ile yeniden oluştur
          rm -rf ios
          npx cap add ios --packagemanager Cocoapods   # CocoaPods'u ZORLA (Podfile + IronSource podspec); flag olmadan SPM seçiyor
          # Info.plist geri yükle (SKAdNetwork + ATT korundu)
          cp /tmp/Info_ccg.plist ios/App/App/Info.plist
          # ⭐ İKON — ALTIN TOP: cap add ios default ikon koydu; assets/icon-only.png'den yeniden üret
          npx @capacitor/assets generate --ios || echo "⚠️ ikon üretimi uyarı verdi (devam)"
          # Podfile gerçekten oluştu mu?
          if [ ! -f ios/App/Podfile ]; then
            echo "❌ Podfile YOK — cap add hâlâ SPM seçti. Kalan dosyalar:"; ls -la ios/App/
            exit 1
          fi
          # deployment target 15 (LevelPlay iOS 15+ ister)
          if grep -q "platform :ios" ios/App/Podfile; then
            sed -i '' "s/platform :ios.*/platform :ios, '15.0'/" ios/App/Podfile
          else
            printf "platform :ios, '15.0'\n%s" "$(cat ios/App/Podfile)" > ios/App/Podfile
          fi
          echo "=== Podfile ilk satırlar ==="; head -8 ios/App/Podfile
      - name: Capacitor sync + pod install (LevelPlay + IronSource SDK çekilir)
        script: |
          set -e
          npx cap sync ios
          cd ios/App && pod install --repo-update
      - name: İmza — sertifika + profil (ASC API key)
        script: |
          set -e
          keychain initialize
          if [ -z "$DIST_CERT_KEY_B64" ]; then
            echo "❌ DIST_CERT_KEY_B64 BOŞ. Codemagic > Environment variables: ad=DIST_CERT_KEY_B64 grup=ios_signing Secure=✓"
            exit 1
          fi
          printf '%s' "$DIST_CERT_KEY_B64" | openssl base64 -d -A > /tmp/dist_key_raw.pem
          if ! grep -qE "BEGIN (RSA )?PRIVATE KEY" /tmp/dist_key_raw.pem; then
            echo "❌ Çözülen içerik geçerli PEM değil."; exit 1
          fi
          if openssl rsa -in /tmp/dist_key_raw.pem -traditional -out /tmp/dist_key.pem 2>/dev/null \
             || openssl rsa -in /tmp/dist_key_raw.pem -out /tmp/dist_key.pem 2>/dev/null; then
            echo "✅ key normalize (PKCS#1)"
          else
            echo "❌ openssl key parse edemedi."; exit 1
          fi
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/dist_key.pem \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Sürüm + build numarası
        script: |
          cd ios/App
          agvtool new-marketing-version 1.1.0
          agvtool new-version -all $(($BUILD_NUMBER + 100))
      - name: IPA derle (App Store, CocoaPods workspace)
        script: |
          xcode-project build-ipa --workspace "$XCODE_WORKSPACE" --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false            # TestFlight'a yükler; App Store gönderimini elle yaparız
